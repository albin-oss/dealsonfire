name: ci
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: dof_test
        ports: ['5432:5432']
        options: >-
          --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 10
    env:
      TEST_DATABASE_URL: postgres://postgres:postgres@localhost:5432/dof_test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, cache: npm }
      - run: npm ci
      - run: npm run check:boundaries
      - run: npm run check:data
      - run: npm run check:operations
      - run: npm run check:identity
      - run: npm run check:tokens
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run test:unit
      - run: npm run test:ui
      - run: npm run test:integration
      - run: npm run build
      - run: npm run build:storybook
      - run: npx playwright install --with-deps chromium
      # Visual baselines are per-platform (darwin committed; linux pending — see D-32
      # debt register). a11y + keyboard + app-shell gates run everywhere.
      - run: npx playwright test --grep-invert "visual:"

